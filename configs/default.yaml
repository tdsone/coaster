encoder:
  vocab_size: 6
  d_model: 256
  n_heads: 4
  n_layers: 4
  ffn_dim: 1024
  dropout: 0.1
  dna_len: 4992
  conv_kernel: 8
  conv_stride: 8

decoder:
  vocab_size: 8
  d_model: 256
  n_heads: 4
  n_layers: 4
  ffn_dim: 1024
  dropout: 0.1
  max_rna_len: 200

training:
  batch_size: 32
  num_epochs: 50000
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip: 1.0
  num_samples: 100
  seed: 42
  device: cuda
  checkpoint_dir: checkpoints
  log_interval: 100
  wandb_project: coaster
